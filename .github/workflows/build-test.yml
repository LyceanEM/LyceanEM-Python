# .github/workflows/build-test.yml
name: Build & Test LyceanEM (Build-Testing only – NO PUBLISH)

on:
  push:
    branches: [ Build-Testing ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJSON(format('{0}', github.repository == 'LyceanEM/LyceanEM-Python' && include('matrix.yaml') || '[]')) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel>=2.17

      # CUDA Toolkit (Linux x86_64 only – mirrors CuPy reproducible builds)
      - name: Install CUDA Toolkit (Linux x86_64)
        if: matrix.platform == 'linux' && contains(matrix.archs, 'x86_64')
        run: |
          sudo yum install -y epel-release
          sudo yum install -y https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-keyring-1.1-1.x86_64.rpm
          sudo yum install -y cuda-toolkit-12-4
          echo "CUDA_PATH=/usr/local/cuda-12.4" >> $GITHUB_ENV
          echo "PATH=/usr/local/cuda-12.4/bin:$PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/cuda-12.4/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
          CIBW_ENVIRONMENT: |
            CMAKE_ARGS="-DLYCEANEM_ENABLE_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=60;70;75;80;86;89;90"
            CUDA_PATH=${{ env.CUDA_PATH }}
            PATH=${{ env.PATH }}
            LD_LIBRARY_PATH=${{ env.LD_LIBRARY_PATH }}

      - name: Upload wheels as artifact (for manual testing)
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}${{ matrix.platform == 'linux' && contains(matrix.archs, 'x86_64') && '-cuda' || '' }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: python -m build --sdist
      - name: Upload sdist as artifact (for manual testing)
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # NO PUBLISH JOB – artifacts are available for download only