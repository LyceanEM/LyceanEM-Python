name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # === Use pre-built manylinux-cuda image (from ameli/manylinux-cuda repo) ===
          # CUDA 12.3 on manylinux_2_28 is the closest stable match to your 12.4 requirement
          CIBW_MANYLINUX_X86_64_IMAGE: sameli/manylinux_2_28_x86_64_cuda_12.3
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_ENVIRONMENT_LINUX: |
            CUDA_HOME=/usr/local/cuda
            CUDAToolkit_ROOT=/usr/local/cuda
            PATH=/usr/local/cuda/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            CMAKE_ARGS="-DCUDAToolkit_ROOT=/usr/local/cuda -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc -DPython3_EXECUTABLE=$(which python) -DPython3_ROOT_DIR=$(python -c 'import sys; print(sys.prefix)') -DPython3_FIND_STRATEGY=LOCATION"
          CIBW_ENVIRONMENT_WINDOWS: "CUDA_PATH=$CUDA_PATH"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_SKIP: "*musllinux*"
        # with:
        #   package-dir: .
        #   output-dir: wheelhouse
        #   config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        with:
          name: lyceanem-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl