# .github/workflows/conda-test-build.yml
name: Conda Build Test (Build-Testing only – NO UPLOAD)

on:
  push:
    branches: [ Build-Testing ]
  workflow_dispatch:

jobs:
  conda-build:
    name: Build Conda package (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install conda-build
        run: |
          conda install -y -c conda-forge conda-build

      - name: Build Conda package (dry-run test)
        run: conda build conda/ --no-anaconda-upload --output-folder ./conda-pkgs
        env:
          CONDA_BLD_PATH: ../conda-pkgs

      - name: Upload Conda package artifact (for manual testing)
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: ../conda-pkgs/**/*.tar.bz2