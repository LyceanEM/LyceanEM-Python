name: Publish LyceanEM to PyPI & conda (Windows, Linux, macOS)

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # Required for PyPI Trusted Publishing

jobs:
  # ------------------------------------------------------------------
  # PyPI: Cross-platform wheels + sdist (cibuildwheel + scikit-build)
  # ------------------------------------------------------------------
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools_scm needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp312-*"   # adjust Python versions as needed
          CIBW_ARCHS: "auto"      # x86_64 + arm64 where supported
          # Note: For full CUDA support on Linux/Windows add before-build steps
          # (see cibuildwheel docs for environment setup)

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build setuptools_scm

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    # ONLY publish versions/tags on master
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: pypi   # create this environment in GitHub repo settings

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publisher – no secret token required

  # ------------------------------------------------------------------
  # Conda: Cross-platform builds + upload to lyceanem channel
  # ------------------------------------------------------------------
  build_and_publish_conda:
    name: Build & publish conda package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    # ONLY publish versions/tags on master
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: conda-forge, nvidia
          channel-priority: strict

      - name: Install conda-build & anaconda-client
        run: conda install -y conda-build anaconda-client

      - name: Build conda package
        run: |
          conda build conda/ --output-folder ./conda_pkgs
        shell: bash

      - name: Upload to Anaconda.org (lyceanem channel)
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          anaconda --token $ANACONDA_TOKEN upload \
            --force --no-progress \
            --channel lyceanem \
            ./conda_pkgs/**/*.conda
        shell: bash