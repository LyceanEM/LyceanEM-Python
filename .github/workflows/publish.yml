name: PyPI - Build & Publish

on:
  release:
    types: [published]
  workflow_dispatch:     # Only manual trigger + releases
    branches:
      - master



permissions:
  contents: read

jobs:
    build_wheels:
      name: Build wheels on ${{ matrix.os }}
      runs-on: ${{ matrix.os }}
      strategy:
        matrix:
          os: [ ubuntu-22.04, windows-latest ]

      steps:
        - uses: actions/checkout@v6
          with:
            persist-credentials: false
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.x'

        - name: Install cibuildwheel
          run: python -m pip install cibuildwheel

        # === CUDA setup (Windows only) ===
        - name: Install CUDA Toolkit (Windows)
          if: runner.os == 'Windows'
          uses: Jimver/cuda-toolkit@v0.2.35
          with:
            cuda: '13.2.0'

        - name: Verify CUDA compiler is visible
          if: runner.os == 'Windows'
          run: |
            echo "CUDA_PATH=$env:CUDA_PATH"
            echo "PATH contains CUDA bin: $($env:PATH -split ';' | Select-String 'CUDA')"
            nvcc --version
            where.exe nvcc
          shell: pwsh

        - name: Activate MSVC x64 developer command prompt
          if: runner.os == 'windows'
          uses: ilammy/msvc-dev-cmd@v1
          with:
            arch: x64
        - name: Determine version
          id: version
          shell: bash
          run: |
            if ( ${{ github.event_name }} = "release" ); then
              VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
            else
              LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
              VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected version: $VERSION"

        - name: Build wheels
          run: python -m cibuildwheel --output-dir wheelhouse
          env:
            CIBW_ENVIRONMENT: >-
                ${{ steps.version.outputs.version != '' && 
                   format('SETUPTOOLS_SCM_PRETEND_VERSION={0}', steps.version.outputs.version) || '' }}
            # === Windows: explicit nvcc path right before each wheel build ===
            CIBW_ARCHS_WINDOWS: "AMD64"
            CIBW_BEFORE_BUILD_WINDOWS: |
              set "PATH=%CUDA_PATH%\bin;%PATH%"
              set "CUDAToolkit_ROOT=%CUDA_PATH%"
              set "CMAKE_CUDA_COMPILER=%CUDA_PATH%\bin\nvcc.exe"
            

            CIBW_MANYLINUX_X86_64_IMAGE: sameli/manylinux_2_34_x86_64_cuda_12.8
            CIBW_BEFORE_ALL_LINUX: |
              python -m pip install pybind11   # ← Fixed: installs pybind11Config.cmake

            CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
            CIBW_ENVIRONMENT_LINUX: |
              CUDA_HOME=/usr/local/cuda
              CUDAToolkit_ROOT=/usr/local/cuda
              PATH=/usr/local/cuda/bin:$PATH
              LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
              CMAKE_ARGS="-DCUDAToolkit_ROOT=/usr/local/cuda -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc -DCMAKE_CUDA_FLAGS=--allow-unsupported-compiler -DPython3_EXECUTABLE=$(which python) -DPython3_ROOT_DIR=$(python -c 'import sys; print(sys.prefix)') -DPython3_FIND_STRATEGY=LOCATION"
            CIBW_ENVIRONMENT_WINDOWS: |
              CUDA_PATH=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
              PATH=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}\bin;${{ env.PATH }}
              CUDAToolkit_ROOT=$CUDA_PATH
              CMAKE_ARGS="-DCUDAToolkit_ROOT=$CUDA_PATH -DCMAKE_CUDA_COMPILER=$CUDA_PATH/bin/nvcc.exe -DPython3_EXECUTABLE=$(which python) -DPython3_ROOT_DIR=$(python -c 'import sys; print(sys.prefix)') -DPython3_FIND_STRATEGY=LOCATION"
            CIBW_ARCHS_LINUX: "x86_64"
            CIBW_ARCHS_MACOS: "x86_64 arm64"
            CIBW_SKIP: "*musllinux*"


        - uses: actions/upload-artifact@v4
          with:
            name: lyceanem-wheels-${{ matrix.os }}-${{ strategy.job-index }}
            path: ./wheelhouse/*.whl
    # === Publish to PyPI ONLY on master branch (trusted publishing) ===
    publish:
      name: Publish to PyPI
      needs: build_wheels
      if: github.ref == 'refs/heads/master'
      runs-on: ubuntu-latest
      environment: pypi   # recommended: create this environment in GitHub repo settings
      permissions:
        id-token: write   # mandatory for trusted publishing

      steps:
        - uses: actions/checkout@v4

        - name: Download all built wheels
          uses: actions/download-artifact@v4
          with:
            path: wheelhouse
            pattern: lyceanem-wheels-*
            merge-multiple: true

        - name: Publish to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            packages-dir: wheelhouse