name: PyPI - Build & Publish

on:
  push:
    branches:
      - master
      - Build-Testing

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'   # cibuildwheel will build for all supported versions

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      # === CUDA setup (Windows only) ===
      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: '12.4.0'   # match your LyceanEM CUDA requirement

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Tell CMake where CUDA lives (your existing CMakeLists.txt will pick this up)
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y yum-utils
            yum-config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
            yum install -y cuda-toolkit-12-4
            # ensure standard symlink that CMake expects
            ln -sf /usr/local/cuda-12.4 /usr/local/cuda || true
          # ← NEW: explicit exports RIGHT BEFORE each wheel build (fixes early project(LANGUAGES CUDA))
          CIBW_BEFORE_BUILD_LINUX: |
            export PATH=/usr/local/cuda/bin:$PATH
            export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            export CUDACXX=/usr/local/cuda/bin/nvcc
            export CMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc
            export CUDAToolkit_ROOT=/usr/local/cuda
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_ENVIRONMENT_LINUX: |
            CUDA_HOME=/usr/local/cuda
            CUDAToolkit_ROOT=/usr/local/cuda
            CUDACXX=/usr/local/cuda/bin/nvcc
            PATH=/usr/local/cuda/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            CMAKE_ARGS="-DCUDAToolkit_ROOT=/usr/local/cuda -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc -DPython3_EXECUTABLE=$(which python) -DPython3_ROOT_DIR=$(python -c 'import sys; print(sys.prefix)') -DPython3_FIND_STRATEGY=LOCATION"
          CIBW_ENVIRONMENT_WINDOWS: "CUDA_PATH=$CUDA_PATH"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_SKIP: "*musllinux*"

      - name: Upload wheels as artifacts (for Build-Testing or manual download)
        uses: actions/upload-artifact@v4
        with:
          name: lyceanem-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  # === Publish to PyPI ONLY on master branch (trusted publishing) ===
  publish:
    name: Publish to PyPI
    needs: build-wheels
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: pypi   # recommended: create this environment in GitHub repo settings
    permissions:
      id-token: write   # mandatory for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Download all built wheels
        uses: actions/download-artifact@v4
        with:
          path: wheelhouse
          pattern: lyceanem-wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse