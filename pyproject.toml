[build-system]
requires = ["scikit-build-core >=0.10", "cibuildwheel>=2.17", "build"]
build-backend = "scikit_build_core.build"

[project]
name = "lyceanem"
# version is overridden by GitHub tag or left dynamic for testing
dynamic = ["version"]
# ... your existing project metadata, dependencies, etc. ...

[tool.cibuildwheel]
build-frontend = "build"
build = "cp39-* cp310-* cp311-* cp312-*"
skip = "pp* *musllinux*"

[tool.cibuildwheel.linux]
archs = ["x86_64", "aarch64"]

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]

[tool.cibuildwheel.windows]
archs = ["AMD64"]

[tool.cibuildwheel.environment]
# Testing flags – smoke test the import + CUDA availability
CIBW_TEST_COMMAND = "python -c 'import lyceanem; print(\"LyceanEM version:\", lyceanem.__version__); import torch; print(\"CUDA available:\", torch.cuda.is_available() if torch.cuda.is_available() else \"CPU-only\")'"

[tool.scikit-build]
# Enable CUDA by default in testing builds (Linux only)
cmake.define.LYCEANEM_ENABLE_CUDA = "ON"
cmake.define.CMAKE_CUDA_ARCHITECTURES = "60;70;75;80;86;89;90"
